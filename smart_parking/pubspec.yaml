  smooth_page_indicator: ^1.0.0+2
  toggle_switch: ^2.0.1
  dotted_border: ^2.0.0+2
  badges: ^2.0.2
  shared_preferences: ^2.0.15
  table_calendar: ^3.0.6
  im_stepper: ^1.0.1+1
  time_range_picker : any
  flag: ^6.0.0
  flutter_form_builder: ^7.6.0
  form_builder_validators: ^8.3.0
  country_list_pick: ^1.0.1+6
