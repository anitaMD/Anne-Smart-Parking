  flutter_localizations: # Add this line
    sdk: flutter
  intro_slider: ^3.0.9
  firebase_auth: ^3.2.0
  firebase_core: ^1.10.0
  email_validator: ^2.0.1
  fluttertoast: ^8.0.8
