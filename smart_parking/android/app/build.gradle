plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.example.smart_parking" // ← vérifie ton namespace réel
    compileSdk 36
    ndkVersion = "28.2.13676358"
    compileOptions {
        coreLibraryDesugaringEnabled true    // ← AJOUTER
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.example.smart_parking" // ← vérifie ton appId réel
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        compileSdk 36     // ← changer de 34 à 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.0'
    implementation platform('com.google.firebase:firebase-bom:30.2.0')
    implementation 'com.android.support:multidex:2.0.1'
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.android.gms:play-services-auth:20.3.0'
    implementation 'com.google.android.gms:play-services-auth-api-phone:18.0.1'
    implementation("com.squareup.okhttp3:okhttp:4.9.3")
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'  // ← AJOUTER

    

}
